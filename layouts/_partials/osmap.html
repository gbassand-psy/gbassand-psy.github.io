{{ $contact := .Site.Data.contact }}

<div class="contact-map">
  <iframe
    src="https://www.openstreetmap.org/export/embed.html?bbox={{ sub $contact.address_osm_lon 0.001 }},{{ sub $contact.address_osm_lat 0.001 }},{{ add $contact.address_osm_lon 0.001 }},{{ add $contact.address_osm_lat 0.001 }}&layer=mapnik&marker={{ $contact.address_osm_lat }},{{ $contact.address_osm_lon }}"
    width="100%"
    height="400"
    style="border:0;"
    allowfullscreen=""
    loading="lazy"
    title="{{ i18n "contact_map_title" | strings.FirstUpper }}">
  </iframe>
</div>
<div class="contact-directions">
  <a href="{{ $contact.directions_url }}" target="_blank" rel="noopener" class="btn btn-primary contact-directions-btn">
    {{ i18n "contact_directions_label" | strings.FirstUpper }}
  </a>
</div>
