{{ if hugo.IsMultilingual }}
  {{ if .IsTranslated }}
    {{ range .Translations }}
      <li class="menu-item-language">
        <a href="{{ .RelPermalink }}">{{ .Language.LanguageName }}</a>
      </li>
    {{ end }}
  {{ else }}
    {{ range site.Languages }}
      {{ if ne site.Language.Lang .Lang }}
        <li class="menu-item-language">
          <a href="{{ .Lang | relURL }}">{{ .LanguageName }}</a>
        </li>
      {{ end }}
    {{ end }}
  {{ end }}
{{ end }}
