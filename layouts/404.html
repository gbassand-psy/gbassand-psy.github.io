{{ define "body_classes" }}page-404{{ end }}

{{ define "main" }}
<div id="not-found">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-7">
        <p class="not-found-code">404</p>
        <h1 class="not-found-title">{{ i18n "not_found_title" }}</h1>
        <p class="not-found-message">{{ i18n "not_found_message" }}</p>
        <div class="not-found-actions">
          <a href="/" class="btn btn-primary">{{ i18n "not_found_action_label" }}</a>
        </div>
      </div>
    </div>
  </div>
</div>
{{ end }}
