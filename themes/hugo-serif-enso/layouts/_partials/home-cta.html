<div id="strip-cta">
  <div class="container">
    <div class="row justify-content-center text-center">
      <div class="col-12 col-md-8">
        <p class="cta-tagline">{{ i18n "cta_tagline" | strings.FirstUpper }}</p>
        <div class="cta-buttons">
          <a href="{{ i18n "url_book" | relLangURL }}" class="button button-primary cta-button-main">
            {{ i18n "book_appointment_label" | strings.FirstUpper }}
          </a>
          <a href="{{ i18n "url_contact" | relLangURL }}" class="button cta-button-secondary">
            {{ i18n "question_label" | strings.FirstUpper }}
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
