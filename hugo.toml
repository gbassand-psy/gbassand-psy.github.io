baseURL = 'https://enso-psychologie.ch/'
languageCode = 'fr'
title = 'ENSŌ Psychologie'
themesDir = 'themes'
theme = 'hugo-serif-theme'

defaultContentLanguage = 'fr'
defaultContentLanguageInSubdir = false

[module]
  [module.hugoVersion]
    extended = true
    min = "0.55.0"

[params]
  google_analytics_id = ""
  google_tag_manager_id = ""
  favicon = "images/logos/favicon.ico"

  [params.homepage]
    sticky_header = true
    show_contact_box = true      # show / hide the contaxt box on the homepage
    show_services_button = false # show / hide the "view all services" button

  [params.logo]
    mobile = "images/logos/enso-logo-mobile-220x220.png"
    mobile_height = "36px"
    desktop = "images/logos/enso-logo-web-860x220.png"
    desktop_height = "36px"
    alt = "ENSŌ Psychologie"

  [params.fonts]
    # sets the google font link in layouts/partials/google-fonts.html
    google_fonts = 'https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Sans+Pro:wght@400;700&display=swap'
    heading = "Playfair Display"
    base = "Source Sans Pro"

  [params.colors]
    primary = "#4A7C6F"
    black = "#2f2f41"
    white = "#ffffff"
    white_offset = "#f8f7f4"
    grey = "#5C5A5A"

  [params.seo]
    meta_twitter_site = ""
    meta_twitter_creator = ""
    meta_og_image = "https://enso-psychologie.ch/images/og-image.jpg"

  [params.services]
    summary_truncate = 120 # How many characters to include in the summary of the services before truncating

  [params.team]
    summary_large_truncate = 120 # How many characters to include in the summary of the team bios (large layout) before truncating

  [params.footer]
    copyright_text = '© Guillaume Bassand – ENSŌ Psychologie'

[languages]
  [languages.fr]
    languageCode = 'fr-CH'
    languageName = "Français"
    weight = 1
    [languages.fr.params.seo]
      meta_og_locale = "fr_CH"
    [languages.en.params.seo]
      meta_og_locale = "en_GB"
    [[languages.fr.menu.main]]
      name = "Prestations"
      url = "/prestations/"
      weight = 1
    [[languages.fr.menu.main]]
      name = "Prendre rendez-vous"
      url = "/prendre-rendez-vous/"
      weight = 2
    [[languages.fr.menu.main]]
      name = "À propos"
      url = "/a-propos/"
      weight = 3
    [[languages.fr.menu.main]]
      name = "Contact"
      url = "/contact/"
      weight = 4
    [[languages.fr.menu.footer]]
      name = "Accueil"
      url = "/"
      weight = 1
    [[languages.fr.menu.footer]]
      name = "Prestations"
      url = "/prestations/"
      weight = 2
    [[languages.fr.menu.footer]]
      name = "Prendre rendez-vous"
      url = "/prendre-rendez-vous/"
      weight = 3
    [[languages.fr.menu.footer]]
      name = "À propos"
      url = "/a-propos/"
      weight = 4
    [[languages.fr.menu.footer]]
      name = "Contact"
      url = "/contact/"
      weight = 5
[languages.en]
    languageCode = "en-GB"
    languageName = "English"
    weight = 2
    [languages.en.params]
      og_locale = "en_GB"
    [[languages.en.menu.main]]
      name = "Services"
      url = "/en/services/"
      weight = 1
    [[languages.en.menu.main]]
      name = "Book an appointment"
      url = "/en/book/"
      weight = 2
    [[languages.en.menu.main]]
      name = "About"
      url = "/en/about/"
      weight = 3
    [[languages.en.menu.main]]
      name = "Contact"
      url = "/en/contact/"
      weight = 4
    [[languages.en.menu.footer]]
      name = "Home"
      url = "/en/"
      weight = 1
    [[languages.en.menu.footer]]
      name = "Services"
      url = "/en/services/"
      weight = 2
    [[languages.en.menu.footer]]
      name = "Book an appointment"
      url = "/en/book/"
      weight = 3
    [[languages.en.menu.footer]]
