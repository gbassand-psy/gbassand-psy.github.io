baseURL = 'https://enso-psychologie.ch/'
languageCode = 'fr'
title = 'ENSŌ Psychologie'
themesDir = 'themes'
theme = 'hugo-serif-theme'


[module]
  [module.hugoVersion]
    extended = true
    min = "0.55.0"

[params]
  google_analytics_id = ""
  google_tag_manager_id = ""
  favicon = "favicon-32x32.svg"

  [params.homepage]
    sticky_header = true
    show_contact_box = true      # show / hide the contaxt box on the homepage
    show_services_button = false # show / hide the "view all services" button

  [params.logo]
    mobile = "images/logo/logo-mobile.svg"
    mobile_height = "36px"
    desktop = "images/logo/logo.svg"
    desktop_height = "36px"
    alt = "ENSŌ Psychologie"

  [params.fonts]
    # sets the google font link in layouts/partials/google-fonts.html
    google_fonts = 'https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Sans+Pro:wght@400;700&display=swap'
    heading = "Playfair Display"
    base = "Source Sans Pro"

  [params.colors]
    primary = "#4A7C6F"
    black = "#2f2f41"
    white = "#ffffff"
    white_offset = "#f8f7f4"
    grey = "#5C5A5A"

  [params.seo]
    meta_twitter_site = ""
    meta_twitter_creator = ""
    meta_og_image = "https://enso-psychologie.ch/images/og-image.png"

  [params.services]
    summary_truncate = 120 # How many characters to include in the summary of the services before truncating

  [params.team]
    summary_large_truncate = 120 # How many characters to include in the summary of the team bios (large layout) before truncating

  [params.footer]
    copyright_text = '© Guillaume Bassand – ENSŌ Psychologie'

[menu]
  # Main Menu
  [[menu.main]]
    name = "Prestations"
    url = "/services/"
    weight = 1

  [[menu.main]]
    name = "À propos"
    url = "/about/"
    weight = 2

  [[menu.main]]
    name = "Contact"
    url = "/contact/"
    weight = 3

  # Footer Menu
  [[menu.footer]]
    name = "Accueil"
    url = "/"
    weight = 1

  [[menu.footer]]
    name = "Prestations"
    url = "/services/"
    weight = 2

  [[menu.footer]]
    name = "À propos"
    url = "/about/"
    weight = 3

  [[menu.footer]]
    name = "Contact"
    url = "/contact/"
    weight = 4
